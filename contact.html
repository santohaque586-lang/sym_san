    <section class="contact-section">

        <h1>Need Help?</h1>

        <p>If you have any feedback, project ideas or suggestions feel free to contact me.</p>

        <button class="contact-btn" onclick="openForm()">

            <i class="fa-solid fa-envelope"></i>
            Fill Feedback Form

        </button>

    </section>

    <!-- CONTACT POPUP FORM -->

    <div class="contact-popup" id="contactPopup">

        <div class="popup-form">

            <span class="close-btn" onclick="closeForm()">

                <i class="fa-solid fa-xmark"></i>

            </span>

            <h2>Share Your Thoughts</h2>

            <form id="contactForm" action="https://formspree.io/f/mnjgaged" method="POST" enctype="multipart/form-data">

                <label>Name</label> <input type="text" name="name" id="name" placeholder="Your Name" required>

                <label>Email</label> <input type="email" name="email" id="email" placeholder="Your Email" required>

                <label>Message</label>

                <textarea name="message" id="message" placeholder="Write your message" required></textarea>

                <label>Rate My Portfolio</label>

                <div class="rating">

                    <label><input type="radio" name="rating" value="1"> 1</label> <label><input type="radio"
                            name="rating" value="2"> 2</label> <label><input type="radio" name="rating" value="3">
                        3</label> <label><input type="radio" name="rating" value="4"> 4</label> <label><input
                            type="radio" name="rating" value="5"> 5</label>

                </div>

                <label>Upload Document (Optional)</label>

                <input type="file" name="attachment" accept=".pdf,.doc,.docx,.jpg,.png">

                <input type="hidden" name="_subject" value="Portfolio Feedback Message">

                <button type="submit" class="send-btn">

                    Submit Feedback

                </button>

                <p id="formStatus"></p>

            </form>

        </div>

    </div>
